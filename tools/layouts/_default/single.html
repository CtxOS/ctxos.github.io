<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ .Title }} | CTX OS</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        max-width: 900px;
        margin: 0 auto;
        padding: 2rem;
        line-height: 1.6;
        color: #333;
      }
      h1 {
        color: #1a73e8;
      }
      a {
        color: #1a73e8;
      }
      code {
        background: #f4f4f4;
        padding: 0.2rem 0.4rem;
        border-radius: 3px;
      }
      pre {
        background: #f4f4f4;
        padding: 1rem;
        border-radius: 5px;
        overflow-x: auto;
      }
      .breadcrumb {
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="breadcrumb"><a href="/">← Home</a> | <a href="/tools/">Tools</a></div>
    {{ .Content }}
    <hr />
    <footer>
      <p>&copy; 2024 CTX OS</p>
    </footer>
  </body>
</html>
